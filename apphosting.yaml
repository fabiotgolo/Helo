# Configuração do Firebase App Hosting para a Helo.
# As credenciais do Firestore vêm automaticamente da conta de serviço do
# runtime (ADC) — não é preciso configurar chave de banco aqui.

runConfig:
  # Escala a zero quando ocioso, mantendo o custo em R$ 0 no uso da Helo.
  minInstances: 0
  maxInstances: 1
  cpu: 1
  memoryMiB: 512

# Segredos guardados no Cloud Secret Manager (criados via
# `firebase apphosting:secrets:set`). Nunca colocar valores reais aqui.
env:
  - variable: ELEVENLABS_API_KEY
    secret: ELEVENLABS_API_KEY
    availability:
      - RUNTIME
  - variable: ELEVENLABS_VOICE_ID
    secret: ELEVENLABS_VOICE_ID
    availability:
      - RUNTIME
  - variable: ELEVENLABS_HELO_AGENT_ID
    secret: ELEVENLABS_HELO_AGENT_ID
    availability:
      - RUNTIME
  # Só deve ser "true" depois de habilitar Voice ID override no Agent Helo.
  - variable: ELEVENLABS_HELO_VOICE_OVERRIDE_ENABLED
    secret: ELEVENLABS_HELO_VOICE_OVERRIDE_ENABLED
    availability:
      - RUNTIME
  - variable: ELEVENLABS_HELO_PLATFORM_VOICE_FEMALE_ID
    secret: ELEVENLABS_HELO_VOICE_FEMALE_ID
    availability:
      - RUNTIME
  - variable: ELEVENLABS_HELO_PLATFORM_VOICE_MALE_ID
    secret: ELEVENLABS_HELO_VOICE_MALE_ID
    availability:
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - RUNTIME
